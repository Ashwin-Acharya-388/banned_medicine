# A generic, single database configuration.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
# Uncomment the line below if you want the files to be prepended with date
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sys.path for the 'env.py' module — set to project root so imports work.
prepend_sys_path = .

# The database URL is loaded from the environment in env.py, so this
# value is intentionally left as a placeholder.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
